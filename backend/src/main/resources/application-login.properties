spring.datasource.url=${LOGIN_DB_URL:jdbc:mysql://localhost:3306/mlb_analysis_login?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${LOGIN_DB_USERNAME:mlb_login}
spring.datasource.password=${LOGIN_DB_PASSWORD:mlb_login_pw}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
auth.token-ttl=168h
auth.token-bytes=32
