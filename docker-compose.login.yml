services:
  login-mysql:
    image: mysql:8.4
    container_name: mlb-analysis-login-mysql
    environment:
      MYSQL_DATABASE: mlb_analysis_login
      MYSQL_USER: mlb_login
      MYSQL_PASSWORD: mlb_login_pw
      MYSQL_ROOT_PASSWORD: root_pw
    ports:
      - "3306:3306"
    volumes:
      - login-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "mlb_login", "-pmlb_login_pw"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  login-mysql-data:
